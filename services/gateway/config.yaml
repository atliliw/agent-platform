# Gateway Service Configuration
server:
  http_port: 9000

# LLM Configuration - DashScope (阿里云通义千问)
llm:
  provider: dashscope
  api_key: "sk-6eb65fcf5d17491ca10b984efe1f43e7"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.7-max-2026-05-17"
