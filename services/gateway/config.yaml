# Gateway Service Configuration
server:
  http_port: 9000

# LLM Configuration - DashScope (阿里云通义千问)
llm:
  provider: dashscope
  api_key: "<your-api-key>"  # 填真实 DashScope API Key（config.yaml 已 gitignore，真实 key 写那里）
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.7-max-2026-06-08"
  embedding_model: "text-embedding-v3"
  max_tokens: 4096

# Redis Cache
redis:
  url: redis://redis:6379

# Microservices Addresses
services:
  chat: chat-service:50001
  knowledge: knowledge-service:50002
  memory: memory-service:50003
  a2a: a2a-service:50004
  mcp: mcp-service:50005
  harness: harness-service:50007
  agent: agent-service:50006

# Logging
logging:
  level: info
  format: json
