server:
  grpc_port: 50007

database:
  sqlite:
    path: ./data/harness.db

llm:
  provider: dashscope
  api_key: "<your-api-key>"  # 填真实 DashScope API Key（config.yaml 已 gitignore，真实 key 写那里）
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.7-max-2026-06-08"
  models:
    chat: "qwen3.7-max-2026-06-08"
    embedding: "text-embedding-v3"

# Microservices
services:
  agent: agent-service:50006

redis:
  url: redis://redis:6379

logging:
  level: info
  format: json
