syntax = "proto3";

package harness;

option go_package = "agent-platform/pkg/pb/harness";

// Session 会话
message Session {
    string id = 1;
    string agent_id = 2;
    string trace_id = 3;
    string status = 4;  // running, completed, failed
    int64 start_time = 5;
    int64 end_time = 6;
    int64 duration = 7;
    int64 total_tokens = 8;
    double total_cost = 9;
    string model = 10;
    map<string, string> metadata = 11;
    int64 created_at = 12;
}

// SessionStep 会话步骤
message SessionStep {
    string id = 1;
    string session_id = 2;
    int32 step_number = 3;
    string step_type = 4;  // think, tool_call, action, observation, decision, llm_call
    string parent_step_id = 5;
    string input = 6;   // JSON
    string output = 7;  // JSON
    string metadata = 8; // JSON
    int64 duration = 9;
    string status = 10;
    int64 timestamp = 11;
}

// SessionGraph 执行图
message SessionGraph {
    repeated GraphNode nodes = 1;
    repeated GraphEdge edges = 2;
}

message GraphNode {
    string id = 1;
    string type = 2;
    string label = 3;
    int64 duration = 4;
    string status = 5;
    map<string, string> metadata = 6;
}

message GraphEdge {
    string from = 1;
    string to = 2;
    string label = 3;
}

message CreateSessionRequest {
    string agent_id = 1;
    string trace_id = 2;
    string model = 3;
    map<string, string> metadata = 4;
    string tenant_id = 5;
}

message CreateSessionResponse {
    Session session = 1;
}

message GetSessionRequest {
    string session_id = 1;
}

message SessionDetail {
    Session session = 1;
    repeated SessionStep steps = 2;
    SessionGraph graph = 3;
}

message ListSessionsRequest {
    string agent_id = 1;
    string status = 2;
    int64 start_time = 3;
    int64 end_time = 4;
    int32 page = 5;
    int32 page_size = 6;
    string tenant_id = 7;
}

message ListSessionsResponse {
    repeated Session sessions = 1;
    int64 total = 2;
}

message RecordStepRequest {
    string session_id = 1;
    string step_type = 2;
    string parent_step_id = 3;
    string input = 4;
    string output = 5;
    string metadata = 6;
    int64 duration = 7;
    string status = 8;
}

message RecordStepResponse {
    SessionStep step = 1;
}

message EndSessionRequest {
    string session_id = 1;
    string status = 2;
}

message EndSessionResponse {
    Session session = 1;
}

message ReplaySessionRequest {
    string session_id = 1;
    int32 from_step = 2;  // Optional: start from specific step
    int32 to_step = 3;    // Optional: end at specific step
    bool dry_run = 4;     // If true, only simulate without executing
}

message ReplaySessionResponse {
    string replay_id = 1;
    repeated SessionStep steps = 2;
    repeated ReplayDiff diffs = 3;
    bool success = 4;
    string error = 5;
}

message ReplayDiff {
    string step_id = 1;
    int32 step_number = 2;
    string original_output = 3;
    string replay_output = 4;
    bool matches = 5;
}

message GetSessionGraphRequest {
    string session_id = 1;
}

message ExportSessionRequest {
    string session_id = 1;
    string format = 2;  // "json", "markdown", "html"
}

message ExportSessionResponse {
    string content = 1;
    string format = 2;
}
