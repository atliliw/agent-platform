syntax = "proto3";

package agent;

option go_package = "agent-platform/pkg/pb/agent";

import "common/common.proto";

// Agent definition
message Agent {
  string id = 1;
  string name = 2;
  string description = 3;
  string instructions = 4;
  repeated string tools = 5;
  repeated string handoffs = 6;
  string model = 7;
  int32 max_tokens = 8;
  double temperature = 9;
  map<string, string> metadata = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
}

// Agent execution record
message AgentExecutionRecord {
  string agent_id = 1;
  string agent_name = 2;
  string thought = 3;
  string action = 4;
  string arguments = 5;
  string result = 6;
  string handoff_to = 7;
  int32 tokens_used = 8;
  int64 started_at = 9;
  int64 completed_at = 10;
  int64 duration_ms = 11;
}

// Execution context
message ExecutionContext {
  string id = 1;
  string session_id = 2;
  string tenant_id = 3;
  string user_id = 4;
  map<string, string> variables = 5;
  repeated Message messages = 6;
  repeated AgentExecutionRecord agent_history = 7;
  string current_agent = 8;
  string entry_agent = 9;
  string status = 10;
  int32 total_tokens = 11;
  double total_cost = 12;
  string error = 13;
  int64 started_at = 14;
  int64 completed_at = 15;
  int32 step_count = 16;
}

// Message
message Message {
  string role = 1;
  string content = 2;
  string name = 3;
  string tool_id = 4;
}

// Tool call
message ToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;
  string result = 4;
  string status = 5;
}

// Register Agent Request
message RegisterAgentRequest {
  Agent agent = 1;
}

// Register Agent Response
message RegisterAgentResponse {
  Agent agent = 1;
}

// Unregister Agent Request
message UnregisterAgentRequest {
  string agent_id = 1;
}

// Unregister Agent Response
message UnregisterAgentResponse {
  bool success = 1;
}

// Get Agent Request
message GetAgentRequest {
  string agent_id = 1;
}

// Get Agent Response
message GetAgentResponse {
  Agent agent = 1;
}

// List Agents Request
message ListAgentsRequest {
  common.PaginationRequest pagination = 1;
}

// List Agents Response
message ListAgentsResponse {
  repeated Agent agents = 1;
  common.PaginationResponse pagination = 2;
}

// Execute Request
message ExecuteRequest {
  string session_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string message = 4;
  string entry_agent = 5;
  map<string, string> context_vars = 6;
}

// Execute Response
message ExecuteResponse {
  string context_id = 1;
  string session_id = 2;
  string response = 3;
  repeated AgentExecutionRecord agent_history = 4;
  int32 total_tokens = 5;
  double total_cost = 6;
  string status = 7;
  string error = 8;
}

// Get Context Request
message GetContextRequest {
  string context_id = 1;
}

// Get Context Response
message GetContextResponse {
  ExecutionContext context = 1;
}

// Execute Stream Request
message ExecuteStreamRequest {
  string session_id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string message = 4;
  string entry_agent = 5;
  map<string, string> context_vars = 6;
}

// Execute Stream Chunk
message ExecuteStreamChunk {
  string type = 1; // "agent_step", "tool_call", "handoff", "response"
  string content = 2;
  AgentExecutionRecord step = 3;
  ToolCall tool_call = 4;
  string current_agent = 5;
}

// Agent Service
service AgentService {
  // Register an agent
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);

  // Unregister an agent
  rpc UnregisterAgent(UnregisterAgentRequest) returns (UnregisterAgentResponse);

  // Get an agent by ID
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);

  // List all agents
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // Execute multi-agent workflow
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);

  // Execute with streaming
  rpc ExecuteStream(ExecuteStreamRequest) returns (stream ExecuteStreamChunk);

  // Get execution context
  rpc GetContext(GetContextRequest) returns (GetContextResponse);
}
